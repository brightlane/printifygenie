name: Initial Repository Setup
on: [push, workflow_dispatch]

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly granting write access
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Updated for 2026 stability

      - name: Install Dependencies
        run: pip install pandas

      - name: Run Genesis Script
        run: python genesis.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🚀 2026 Engine Explosion: Full System Deploy" || echo "No changes to commit"
          git push origin main
